services:
  broker:
    image: confluentinc/cp-kafka:7.6.0
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      broker:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: broker:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      broker:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: init
    depends_on:
      broker:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server broker:9092 --create --if-not-exists \
          --topic household.power.readings --partitions 11 --replication-factor 1 && \
        kafka-topics --bootstrap-server broker:9092 --create --if-not-exists \
          --topic household.power.peaks --partitions 3 --replication-factor 1
    restart: "no"

  generator:
    build: ./generator
    container_name: generator
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      BOOTSTRAP_SERVERS: broker:9092
      TOPIC: household.power.readings
      DATA_SOURCE: /data/household/synthetic_data.csv
      EVENTS_PER_SECOND: "100"
      LOOP: "true"
    volumes:
      - ./data:/data:ro

  detector:
    build: ./detector
    container_name: detector
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      BOOTSTRAP_SERVERS: broker:9092
      INPUT_TOPIC: household.power.readings
      OUTPUT_TOPIC: household.power.peaks
      GROUP_ID: peak-detector
      WINDOW_SIZE: "200"
      MIN_WINDOW: "30"
      SIGMA: "1.5"
      DETECTION_FEED: grid_import
    restart: on-failure

  reporter:
    build: ./reporter
    container_name: reporter
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "8050:8050"
    environment:
      BOOTSTRAP_SERVERS: broker:9092
      INPUT_TOPIC: household.power.peaks
      GROUP_ID: anomaly-reporter
      FROM_BEGINNING: "true"
      MAX_EVENTS: "5000"
      PORT: "8050"
    restart: on-failure
